<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanchExpress - Retirada</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container" style="background: var(--primary-color);">
        <div class="content content-centered" style="background: var(--white); border-radius: 0 0 40px 40px; flex: none; padding-top: 60px; padding-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <div class="success-icon" style="background: #E8F5E9; width: 100px; height: 100px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 3.5rem; color: #4CAF50; margin: 0 auto 20px auto;">✓</div>
            <h2 style="font-size: 1.8rem; letter-spacing: -1px;">Pedido Confirmado!</h2>
            <p style="color: var(--text-light); margin-top: 10px; padding: 0 10px;">Seu lanche já está na fila de preparo. Aguarde no balcão.</p>
        </div>
        
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;">
            <p style="color: var(--white); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem;">Sua senha de retirada</p>
            <div id="codigoRetirada" class="code-box" style="margin: 15px 0; background: var(--white); color: var(--primary-color); border: none; font-size: 3rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">

            </div>
            <p style="color: rgba(255,255,255,0.8); text-align: center; font-size: 0.9rem; margin-bottom: 40px; max-width: 250px;">
                Apresente este código quando o painel eletrônico chamar.
            </p>
            
            <button class="btn" style="background: var(--bg-color); color: var(--text-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.2);" onclick="window.location.href='produtos.html'">Fazer um novo pedido</button>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
