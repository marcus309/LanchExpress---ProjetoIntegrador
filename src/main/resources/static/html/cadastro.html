<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanchExpress - Cadastre-se</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container" style="justify-content: center; background: url('https://www.transparenttextures.com/patterns/food.png') var(--bg-color); background-blend-mode: multiply;">
        
        <div class="content" style="flex: none; padding: 40px 30px; text-align: center; background: var(--white); border-radius: 30px 30px 0 0; margin-top: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.05);">
            
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <a href="index.html" style="font-size: 1.5rem; color: var(--text-dark); text-decoration: none;">&larr;</a>
                <h1 style="color: var(--text-dark); font-weight: 800; font-size: 1.5rem; margin: 0;">Nova Conta</h1>
                <div style="width: 24px;"></div>
            </div>
            
            <form id="cadastroForm" onsubmit="event.preventDefault(); if(typeof showPremiumAlert !== 'undefined'){ showPremiumAlert('Cadastro realizado com sucesso!', 'success', () => { window.location.href='index.html'; }); } else { alert('Sucesso'); window.location.href='index.html'; }" style="width: 100%; text-align: left;">
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Como quer ser chamado?" required>
                </div>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="nome@email.com" required>
                </div>
                
                <div class="form-group" style="margin-top: 15px;">
                    <label for="senha">Criar Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="••••••••" required>
                </div>
                
                <div style="margin-top: 30px;">
                    <button type="submit" class="btn">Cadastrar Agora</button>
                </div>
            </form>
            
            <div style="margin-top: 25px;">
                <p style="font-size: 0.95rem; color: var(--text-light);">
                    Já tem uma conta? <a href="index.html" class="text-link" style="display: inline; margin-top: 0; font-weight: 600;">Faça Login</a>
                </p>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
