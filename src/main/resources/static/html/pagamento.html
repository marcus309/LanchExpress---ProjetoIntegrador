<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanchExpress - Pagamento</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <a href="carrinho.html" class="back-btn">&larr;</a>
            <h1>Pagamento</h1>
        </div>

        <div class="content" style="padding: 10px 24px 40px 24px;">

            <!-- Resumo do pedido -->
            <div style="background: var(--white); border-radius: 20px; padding: 18px; box-shadow: var(--shadow-sm); margin-bottom: 20px;">
                <h3 style="font-size: 1rem; font-weight: 800; margin-bottom: 12px;">📦 Resumo do pedido</h3>
                <div id="resumoItens" style="margin-bottom: 12px;"></div>
                <hr style="border: none; border-top: 1px dashed #E2E8F0; margin: 12px 0;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="color: var(--text-light);">Total</strong>
                    <strong id="totalPedido" style="color:var(--primary-color); font-size:1.4rem;">R$ 0,00</strong>
                </div>
            </div>

            <!-- Métodos de pagamento -->
            <h3 style="font-size: 1rem; font-weight: 800; margin-bottom: 12px;">💳 Forma de pagamento</h3>

            <div id="opcoes" style="display:flex; flex-direction:column; gap:10px; margin-bottom: 20px;">
                <button class="metodo-pgto" data-metodo="pix">
                    <span style="font-size: 1.6rem;">💠</span>
                    <div style="flex:1; text-align:left;">
                        <strong style="display:block;">Pix</strong>
                        <span style="font-size:0.8rem; color: var(--text-light);">Aprovação instantânea</span>
                    </div>
                </button>
                <button class="metodo-pgto" data-metodo="credito">
                    <span style="font-size: 1.6rem;">💳</span>
                    <div style="flex:1; text-align:left;">
                        <strong style="display:block;">Cartão de Crédito</strong>
                        <span style="font-size:0.8rem; color: var(--text-light);">Visa, Master, Elo</span>
                    </div>
                </button>
                <button class="metodo-pgto" data-metodo="debito">
                    <span style="font-size: 1.6rem;">💳</span>
                    <div style="flex:1; text-align:left;">
                        <strong style="display:block;">Cartão de Débito</strong>
                        <span style="font-size:0.8rem; color: var(--text-light);">Direto da conta</span>
                    </div>
                </button>
                <button class="metodo-pgto" data-metodo="dinheiro">
                    <span style="font-size: 1.6rem;">💵</span>
                    <div style="flex:1; text-align:left;">
                        <strong style="display:block;">Dinheiro na retirada</strong>
                        <span style="font-size:0.8rem; color: var(--text-light);">Pague no balcão</span>
                    </div>
                </button>
            </div>

            <!-- PIX QR Code (escondido inicialmente) -->
            <div id="pixArea" class="pix-card" style="display:none;">
                <h3 style="font-weight:800; margin-bottom:10px;">Escaneie o QR Code</h3>
                <p style="font-size:0.85rem; margin-bottom:14px;">Aponte a câmera do app do seu banco para o código abaixo:</p>
                <div class="pix-qr" id="pixQR"></div>
                <div class="pix-copy-area" id="pixCopia">00020126360014BR.GOV.BCB.PIX0114+5511999999999...</div>
                <button class="btn btn-outline" style="margin-top: 14px; padding: 12px;" onclick="copiarPix()">📋 Copiar código Pix</button>
            </div>

            <button class="btn" id="btnConfirmar" style="margin-top: 16px;" disabled>Selecione um método</button>
        </div>
    </div>

    <style>
        .metodo-pgto {
            display: flex; align-items: center; gap: 14px;
            background: var(--white); border: 2px solid #E2E8F0;
            padding: 16px; border-radius: 18px; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: var(--transition);
        }
        .metodo-pgto:hover { border-color: var(--primary-color); }
        .metodo-pgto.selecionado { border-color: var(--primary-color); background: #FFF7F0; box-shadow: var(--shadow-sm); }
    </style>

    <script src="../js/script.js"></script>
    <script>
        // === Resumo do pedido ===
        const carrinho = JSON.parse(localStorage.getItem('lanchexpress_cart')) || [];
        if (carrinho.length === 0) {
            window.location.href = 'carrinho.html';
        }

        const resumoEl = document.getElementById('resumoItens');
        let total = 0;
        carrinho.forEach(i => {
            total += i.preco * i.quantidade;
            resumoEl.innerHTML += `
                <div style="display:flex; justify-content:space-between; font-size:0.9rem; padding: 4px 0;">
                    <span>${i.quantidade}× ${i.nome}</span>
                    <span>${formatarMoeda(i.preco * i.quantidade)}</span>
                </div>`;
        });
        document.getElementById('totalPedido').innerText = formatarMoeda(total);

        // === Seleção de método ===
        let metodo = null;
        document.querySelectorAll('.metodo-pgto').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.metodo-pgto').forEach(b => b.classList.remove('selecionado'));
                btn.classList.add('selecionado');
                metodo = btn.dataset.metodo;
                document.getElementById('btnConfirmar').disabled = false;
                document.getElementById('btnConfirmar').innerText = (metodo === 'pix' ? 'Já paguei o Pix →' : 'Confirmar pedido →');
                document.getElementById('pixArea').style.display = (metodo === 'pix') ? 'block' : 'none';
                if (metodo === 'pix') gerarQrFake();
            });
        });

        // === QR Code "fake" (visual apenas) ===
        function gerarQrFake() {
            const qr = document.getElementById('pixQR');
            qr.innerHTML = '';
            // gera padrão pseudo-aleatório porém estável (baseado no total)
            const seed = Math.floor(total * 100);
            for (let i = 0; i < 21 * 21; i++) {
                const cell = document.createElement('div');
                // 3 quadrados de "posicionador" nos cantos
                const r = Math.floor(i / 21), c = i % 21;
                const isCorner = (r < 7 && c < 7) || (r < 7 && c > 13) || (r > 13 && c < 7);
                if (isCorner) {
                    const onCornerEdge = (r === 0 || c === 0 || r === 6 || c === 6) ||
                                         (r === 0 || c === 14 || r === 6 || c === 20) ||
                                         (r === 14 || c === 0 || r === 20 || c === 6);
                    cell.className = onCornerEdge ? '' : 'empty';
                } else {
                    // padrão pseudo-aleatório baseado em seed
                    const v = (Math.sin((i + 1) * seed) * 10000) % 1;
                    cell.className = (Math.abs(v) > 0.5) ? '' : 'empty';
                }
                qr.appendChild(cell);
            }
            document.getElementById('pixCopia').innerText =
                `00020126360014BR.GOV.BCB.PIX0114+5511999999999520400005303986540${total.toFixed(2).replace('.', '')}5802BR5913LANCHEXPRESS6009SAO PAULO62070503***6304ABCD`;
        }

        function copiarPix() {
            navigator.clipboard.writeText(document.getElementById('pixCopia').innerText)
                .then(() => showPremiumAlert('Código Pix copiado!'))
                .catch(() => showPremiumAlert('Erro ao copiar.', 'error'));
        }

        // === Confirmação do pedido ===
        document.getElementById('btnConfirmar').addEventListener('click', () => {
            if (!metodo) return;
            localStorage.setItem('lanchexpress_metodo_pagamento', metodo);
            window.location.href = 'retirada.html';
        });
    </script>
</body>
</html>
